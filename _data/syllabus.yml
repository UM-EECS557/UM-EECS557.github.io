intro_markdown: 'EECS 557 introduces you to the exciting world of digital logic design. Digital devices have proliferated in the last quarter century and have become essential in just about anything we do or depend on in a modern society. Computers of all varieties are now at the heart of commerce, communications, education, health care, entertainment, defense, etc. Personal computers have become standard fixtures in most homes and schools. But while the computer is the most visible digital computing device, it is by no means the only one. Embedded digital controllers can be found in such diverse applications as automobiles, airplanes, elevators, cellphones, televisions, cameras, and many kitchen appliances, to name just a tiny few.


  This course provides you with a basic understanding of what digital devices are, how they operate, and how they can be designed to perform useful functions. It forms the foundation for the more advanced hardware courses in our CS, CE, and EE curricula, notably EECS 373, 427, and 470. You will learn about digital design through a combination of lectures, labs, and projects. Through the projects, you will learn to apply the concepts learned in lecture to design real digital circuits using modern design tools and FPGAs.'
sections:
- id: attendance-policy
  title: Attendance Policy
  markdown: In-person attendance is **highly encouraged**. 
    If you must miss class for any reason, recordings of the lectures can be accessed through this link no later than a few hours after the lecture. Lectures cannot be attended remotely via Zoom.  
    
    **Lab sessions require attendance, and labs are graded**. 
  open: true
- id: course-topics
  title: Course Topics
  open: true
  bullet_items:
  - Internet architecture and protocol layers,
  - Adaptive window flows control and TCP protocols,
  - Routing algorithms and network planning,
  - Network calculus,
  - Queueing theory, 
  - Markov chains and packet switching,
  - Fair queueing,
  - Scheduling in wireless networks,
  - Peer-to-peer networks,
  - Load balancing in data centers,
  - Convex optimization and resource optimization
- id: projects
  title: Projects
  markdown: 'You will complete **one or two projects** through the semester. In these projects, you will design and implement various communication network scenarios to understand the concepts discussed in the lectures. 

    The projects should be independent to each other. 


    For further details on the projects, please refer to the [Projects Overview]() page.'
