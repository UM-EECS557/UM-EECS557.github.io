- id: academic-integrity
  title: Academic Integrity
  markdown: 'We encourage collaboration, especially on concepts, tools, specifications, and strategies. However, all submitted work must be your own.

    If you are unsure about what constitutes collaboration versus copying, please ask a member of the teaching staff for clarification.'
  comparison_table:
    headers:
    - Encouraged Collaboration
    - Unacceptable Collaboration
    rows:
    - - Sharing high-level design strategies, e.g., module organization
      - Walking through a design or module step-by-step, sharing pseudocode, sharing comments
    - - Helping others understand the spec or project nuances
      - Providing your code as a reference
    - - Helping someone debug
      - Debugging someone's code for them
    - - Explaining a synthesis error to someone
      - Fixing a synthesis error for someone
    - - Discussing test strategies
      - Sharing test code to verify someone else's design, even if test cases are not submitted
    - - Brainstorming edge cases for testing
      - Discussing specifics about what tests exposed instructor bugs on the autograder
    - - Using starter code provided with a project or based on examples shown in lecture
      - Copying code in whole or in part, even if the code is modified \n Writing original code for someone else, or paying someone to write your project
    - - ''
      - Sharing your code in a way that could be copied, e.g., sending code over email or taking a picture of code
  subsections:
  - title: Code Reuse
    markdown: Reusing code (your own or other students') from previous semesters is not permitted.
  - title: Publishing Code
    markdown: Any code you write for this course must not be published in any way or form, including posting on public repositories (e.g., GitHub, GitLab) or personal websites.
  - title: Generative AI Policy
    markdown: The use of generative AI tools is not permitted for writing code or completing assignments in this course.

- id: attendance-policy
  title: Attendance and pop quiz policy
  markdown: You receive zero point if missing 50% or more pop quizzes.  
    You are not allowed to take the quiz if you are not present when the quiz is distributed. 
    You have five free absences (medical and non-medical) and will receive no penalty for missing a quiz if the instructor receives the absence note by 10am on the lecture day. You have unlimited excused absences for traveling due to university business. These absences need to be preapproved before you travel. 
    The final grade of attendance and pop quizzes is based on the average. 