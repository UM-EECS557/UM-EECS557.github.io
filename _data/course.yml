description:  This course introduces various mathematical foundations of 
 computer communication networks. 
 It covers 
 Internet architecture and protocol layers,
 Adaptive window flows control and TCP protocols,
 Routing algorithms and network planning,
 Network calculus,
 Queueing theory, Markov chains and packet switching,
 Fair queueing,
 Scheduling in wireless networks,
 Peer-to-peer networks,
 Load balancing in data centers, and
 Convex optimization and resource optimization.

